<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Home</title>

<link rel="stylesheet" href="businessHomePage.css">
<script src="searchBusinesses.js" defer></script>

</head>

<body>

<header>
<h1>Customer Dashboard</h1>
</header>

<main>

<section class="business-info">

<h2>Welcome!</h2>

<legend>
Search and connect with Aggie businesses. Use the filters below to find businesses by name, category, or location.
</legend>

<form>

<label for="searchName">Search Business Name</label>
<input type="text" id="searchName" placeholder="Enter business name" onkeyup="searchBusinesses()">

<label for="searchCategory">Category</label>
<select id="searchCategory" onchange="searchBusinesses()">
<option value="All">All Categories</option>
<option value="Hair">Hair</option>
<option value="Arts/Crafts">Arts/Crafts</option>
<option value="Design">Design</option>
</select>

<label for="searchLocation">Location</label>
<input type="text" id="searchLocation" placeholder="Enter location" onkeyup="searchBusinesses()">

</form>

</section>

<section class="business-info">

<h2>Available Businesses</h2>

<div id="results"></div>

</section>

<section class="business-info">

<h2>Manage Appointments</h2>

<legend>
Your booked appointments will appear here.
</legend>

</section>

</main>

</body>
</html>
